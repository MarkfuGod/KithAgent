kernel:
  name: AgentOS
  version: 0.7.0
  pid_file: /tmp/agent_sys.pid
  socket_path: /tmp/agent_sys.sock
  log_level: INFO
  log_file: ~/.agent_sys/logs/sysagent.log
filesystem:
  watch_paths:
  - ~/Documents
  - ~/Desktop
  ignore_patterns:
  - node_modules
  - .git
  - __pycache__
  - '*.pyc'
  - .DS_Store
  - .Trash
  - .cache
  - Library
  - .agent_sys
  - .venv
  - venv
  - env
  ignore_subpaths: []
  allowed_hidden_home_dirs:
  - .cursor
  - .claude
  - .codex
  - .continue
  - .aider
  index_extensions:
  - .py
  - .js
  - .ts
  - .go
  - .rs
  - .sh
  - .java
  - .c
  - .cpp
  - .swift
  - .json
  - .yaml
  - .yml
  - .toml
  - .xml
  - .csv
  - .md
  - .txt
  - .rst
  - .tex
  - .pdf
  - .docx
  - .doc
  - .pptx
  - .xlsx
  - .png
  - .jpg
  - .jpeg
  - .gif
  - .webp
  scan_interval_seconds: 300
  max_file_size_mb: 50
memory:
  db_path: ~/.agent_sys/memory.db
  cache_max_items: 10000
  use_local_embeddings: true
  local_model: all-MiniLM-L6-v2
  embedding:
    provider: dashscope
    api_key_env: DASHSCOPE_API_KEY
    api_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: text-embedding-v4
    dimensions: 1024
  rag:
    enabled: true
    # Keep startup and first insight fast; RAG indexing begins in the background later.
    initial_delay_seconds: 600
    batch_size: 20
    embedding_batch_size: 32
    time_budget_seconds: 90
    chunk_size_chars: 1600
    chunk_overlap_chars: 250
    max_file_size_mb: 5
    allowed_triage_statuses:
    - high
    - medium
    fts_top_k: 20
    vector_top_k: 20
    assistant_top_k: 6
    min_score: 0.05
scheduler:
  max_concurrent_agents: 4
  default_timeout_seconds: 120
  priority_levels: 3
syscall:
  transport: unix_socket
  http_port: 7437
  auth_token_path: ~/.agent_sys/auth_token
  allowed_callers:
  - cursor
  - claude_code
  - openclaw
  - cli
  - dashboard
  - electron
  require_auth: true
  allow_unix_anonymous: true
llm:
  default_provider: openai
  providers:
    openai:
      api_key_env: OPENAI_API_KEY
      models:
        fast: gpt-4o-mini
        strong: gpt-4o
        vision: gpt-4o
    openai_compatible:
      base_url: ''
      api_key_env: OPENAI_COMPATIBLE_API_KEY
      models:
        fast: qwen3.6-plus
        strong: qwen3.6-plus
        vision: qwen-vl-plus
    anthropic:
      api_key_env: ANTHROPIC_API_KEY
      models:
        fast: claude-sonnet-4-20250514
        strong: claude-opus-4-20250514
        reasoning: claude-opus-4-20250514
    anthropic_compatible:
      base_url: ''
      api_key_env: ANTHROPIC_COMPATIBLE_API_KEY
      models:
        fast: MiniMax-M2.7
        strong: MiniMax-M2.7
  defaults:
    text_provider: ''
    text_tier: fast
    vision_provider: openai_compatible
    vision_tier: vision
  functions:
    triage:
      text_tier: fast
    summarize:
      text_tier: fast
    analyze: {}
    report: {}
    brief: {}
    profile: {}
    search: {}
    assistant: {}
  routing:
    summarize: fast
    analyze: strong
    classify: fast
    report: strong
    profile: strong
    search: fast
    vision: vision
cron:
  enabled: true
  adaptive:
    enabled: true
    default_interval_minutes: 30
    min_interval_minutes: 10
    max_interval_minutes: 240
    deep_analysis_hour: 3
    strategy: balanced
  jobs:
  - agent: triage
    trigger: after_scan
  - agent: summarizer
    trigger: after:triage
  - agent: behavior_analyzer
    trigger: interval
    interval_hours: 6
  - agent: priority_classifier
    trigger: after:behavior_analyzer
  - agent: report_generator
    trigger: daily
    time: 09:00
  - agent: profile_builder
    trigger: weekly
profile:
  owner: ''
  data_dir: ~/.agent_sys/profile
triage:
  skip_path_patterns:
  - /node_modules/
  - site-packages/
  - /vendor/
  - /third_party/
  - /.git/objects/
  - /dist/
  - /build/
  - /coverage/
  - /.next/
  - /out/
  - /target/
  - /generated/
  - /.tox/
  - /.eggs/
  - /egg-info/
  - /.mypy_cache/
  - /.pytest_cache/
  - /.cursor/extensions/
  - /.vscode/extensions/
  - /.cursor-server/
  - /.gradle/caches/
  - /.m2/repository/
  - /go/pkg/
  - /.npm/
  - /.cargo/
  - /.rustup/
  - /.oh-my-zsh/
  - /.conda/
  - /anaconda3/
  - /.docker/
  - /.kube/
  - /.local/
  hard_skip_extensions:
  - .lock
  - .map
  hard_skip_file_patterns:
  - package-lock.json
  - npm-shrinkwrap.json
  - yarn.lock
  - pnpm-lock.yaml
  - bun.lockb
  - composer.lock
  - Cargo.lock
  - Pipfile.lock
  - poetry.lock
  - go.sum
  - '*.min.js'
  - '*.min.css'
  - '*.bundle.js'
  - '*.chunk.js'
  - '*_generated.*'
  - '*.generated.*'
  - '*.gen.*'
  - '*.pb.go'
  - '*.pb.ts'
  - '*.g.dart'
  file_type_priority:
    .md: 9
    .docx: 9
    .pdf: 8
    .rst: 8
    .tex: 8
    .py: 7
    .ts: 7
    .go: 7
    .rs: 7
    .swift: 7
    .java: 6
    .c: 6
    .cpp: 6
    .js: 6
    .sh: 6
    .json: 4
    .yaml: 4
    .yml: 4
    .toml: 4
    .xml: 3
    .txt: 3
    .csv: 2
    .png: 5
    .jpg: 5
    .jpeg: 5
    .gif: 3
    .webp: 3
  hints:
  - My own source code projects and personal notes are the most important.
  - Plain .txt files are usually temporary scratch notes — less important unless clearly
    meaningful.
  - Downloaded PDFs/docs are often learning material — worth summarizing.
  - Anything under node_modules/site-packages/vendor is third-party junk — always
    skip.
