kernel:
  name: AgentOS
  version: 0.7.0
  pid_file: /tmp/agent_sys.pid
  socket_path: /tmp/agent_sys.sock
  log_level: INFO
  log_file: ~/.agent_sys/logs/sysagent.log
filesystem:
  # Default to Documents + Desktop only. The first `agent-sys start` will
  # ask the user whether to extend this (e.g. add ~/ or ~/Projects). This
  # is intentionally conservative: we don't want a brand-new install to
  # silently send `~/Downloads/taxes.pdf` to a remote LLM before the user
  # has had any chance to say no.
  watch_paths:
  - '~'
  # Physical-level ignores — directory/filename patterns that are NEVER
  # useful regardless of content (generated bytecode, VCS internals, OS
  # trash, installed venvs). Semantic noise (site-packages, .cursor/extensions
  # etc.) now lives under triage.skip_path_patterns so the LLM can see what
  # was pruned and explain why.
  ignore_patterns:
  - node_modules
  - .git
  - __pycache__
  - '*.pyc'
  - .DS_Store
  - .Trash
  - .cache
  - Library
  - .agent_sys
  - .venv
  - venv
  - env
  ignore_subpaths: []
  # Hidden dot-directories directly under $HOME that should be walked despite
  # the default privacy guard (which otherwise prunes every ~/.* to avoid
  # indexing ssh keys / cloud creds / app caches). Add dirs where you keep
  # hand-authored content you WANT agentos to see.
  #
  # Defaults cover the major AI coding tools — these typically hold the
  # highest-signal user-authored data (rules, prompts, memory).
  allowed_hidden_home_dirs:
  - .cursor        # Cursor IDE: ~/.cursor/rules, mcp.json, settings.json
  - .claude        # Claude Code: ~/.claude/CLAUDE.md, settings.json, memory
  - .codex         # OpenAI Codex CLI configs
  - .continue      # Continue.dev rules & context
  - .aider         # Aider CLI history + settings
  # Uncomment if you keep personal configs here (nvim, fish, git, etc.).
  # WARNING: .config can contain secrets (e.g. .config/gh/hosts.yml with
  # GitHub tokens). If you enable this, review triage.skip_path_patterns
  # below and add targeted excludes like '/.config/gh/' as needed.
  # - .config
  # - .local/share    # Linux app data (Calibre library, etc.) — review first
  # - .zshrc.d        # Personal shell snippet dir
  index_extensions:
  - .py
  - .js
  - .ts
  - .go
  - .rs
  - .sh
  - .java
  - .c
  - .cpp
  - .swift
  - .json
  - .yaml
  - .yml
  - .toml
  - .xml
  - .csv
  - .md
  - .txt
  - .rst
  - .tex
  - .pdf
  - .docx
  - .doc
  - .pptx
  - .xlsx
  - .png
  - .jpg
  - .jpeg
  - .gif
  - .webp
  scan_interval_seconds: 300
  # 50MB covers virtually all real PDFs, Word docs, and source files.
  # Large archives / datasets beyond this are intentionally skipped —
  # they rarely contain useful semantic signal anyway.
  max_file_size_mb: 50
memory:
  db_path: ~/.agent_sys/memory.db
  cache_max_items: 10000
  use_local_embeddings: true
  local_model: all-MiniLM-L6-v2
  embedding:
    provider: dashscope
    api_key_env: DASHSCOPE_API_KEY
    api_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen3-vl-embedding
    dimensions: 0
scheduler:
  max_concurrent_agents: 4
  default_timeout_seconds: 120
  priority_levels: 3
syscall:
  transport: unix_socket
  http_port: 7437
  # HTTP clients must send X-Agent-Token matching the contents of this file.
  # The token is auto-generated on first boot if the file doesn't exist.
  auth_token_path: ~/.agent_sys/auth_token
  # `caller` field on each syscall request must be in this list, unless
  # allowed_callers is empty (which disables the check, back-compat only).
  allowed_callers:
  - cursor
  - claude_code
  - openclaw
  - cli
  - dashboard
  # Require X-Agent-Token on HTTP. Set to false only when testing locally.
  require_auth: true
  # Trust any local Unix-socket client (socket is chmod 600 so only your
  # user can connect). Set to false to also require the token over unix.
  allow_unix_anonymous: true
llm:
  default_provider: openai
  providers:
    openai:
      api_key_env: OPENAI_API_KEY
      models:
        fast: gpt-4o-mini
        strong: gpt-4o
        vision: gpt-4o
    openai_compatible:
      base_url: ''
      api_key_env: OPENAI_COMPATIBLE_API_KEY
      models:
        fast: qwen-plus
        strong: qwen-plus
        vision: qwen-vl-plus
    anthropic:
      api_key_env: ANTHROPIC_API_KEY
      models:
        fast: claude-sonnet-4-20250514
        strong: claude-opus-4-20250514
        reasoning: claude-opus-4-20250514
    anthropic_compatible:
      base_url: ''
      api_key_env: ANTHROPIC_COMPATIBLE_API_KEY
      models:
        fast: MiniMax-M2.7
        strong: MiniMax-M2.7
  defaults:
    # Text provider: if omitted, falls back to llm.default_provider above.
    # Only set this when you specifically want text vs vision on different
    # backends (e.g. Anthropic for text, a Qwen-VL endpoint for images).
    text_tier: fast
    vision_provider: openai_compatible
    vision_tier: vision
  functions:
    # Per-task routing overrides. Keys here map to task_type passed to the
    # router by each agent (triage, summarize, analyze, report, profile,
    # brief, search). Empty dict = inherit defaults.
    triage:
      text_tier: fast
    summarize:
      text_tier: fast
      vision_provider: openai_compatible
      vision_tier: fast
      vision_model: qwen-vl-plus
  routing:
    summarize: fast
    analyze: strong
    classify: fast
    report: strong
    profile: strong
    search: fast
    vision: vision
cron:
  enabled: true
  adaptive:
    enabled: true
    default_interval_minutes: 30
    min_interval_minutes: 10
    max_interval_minutes: 240
    deep_analysis_hour: 3
    strategy: balanced
  jobs:
  - agent: triage
    trigger: after_scan
  - agent: summarizer
    trigger: after:triage
  - agent: behavior_analyzer
    trigger: interval
    interval_hours: 6
  - agent: priority_classifier
    trigger: after:behavior_analyzer
  - agent: report_generator
    trigger: daily
    time: 09:00
  - agent: profile_builder
    trigger: weekly
profile:
  owner: ''
  data_dir: ~/.agent_sys/profile
triage:
  # Rule-based skip: file paths CONTAINING any of these substrings are auto-skipped
  # before any LLM call. Use for third-party/generated/cache paths that are noise
  # regardless of content. Extends (does not replace) filesystem.ignore_patterns.
  skip_path_patterns:
  - site-packages/
  - /vendor/
  - /third_party/
  - /.git/objects/
  - /dist/
  - /build/
  - /.tox/
  - /.eggs/
  - /egg-info/
  - /.mypy_cache/
  - /.pytest_cache/
  - /.cursor/extensions/
  - /.vscode/extensions/
  - /.cursor-server/
  - /.gradle/caches/
  - /.m2/repository/
  - /go/pkg/
  - /.npm/
  - /.cargo/
  - /.rustup/
  - /.oh-my-zsh/
  - /.conda/
  - /anaconda3/
  - /.docker/
  - /.kube/
  - /.local/
  # File-type priority hint (1-10). LLM uses these as ordering preferences, not
  # as hard rules — a .txt file with important content can still be classified
  # high. Higher = analyzed first when token budget is limited.
  file_type_priority:
    .md: 9
    .docx: 9
    .pdf: 8
    .rst: 8
    .tex: 8
    .py: 7
    .ts: 7
    .go: 7
    .rs: 7
    .swift: 7
    .java: 6
    .c: 6
    .cpp: 6
    .js: 6
    .sh: 6
    .json: 4
    .yaml: 4
    .yml: 4
    .toml: 4
    .xml: 3
    .txt: 3
    .csv: 2
    .png: 5
    .jpg: 5
    .jpeg: 5
    .gif: 3
    .webp: 3
  # Free-form user hints — injected into the LLM triage prompt. Express what
  # kinds of files reflect YOU as a person so the LLM prioritizes them.
  hints:
  - "My own source code projects and personal notes are the most important."
  - "Plain .txt files are usually temporary scratch notes — less important unless clearly meaningful."
  - "Downloaded PDFs/docs are often learning material — worth summarizing."
  - "Anything under node_modules/site-packages/vendor is third-party junk — always skip."
